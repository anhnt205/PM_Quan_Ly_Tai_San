# References:
# 1. https://dev.to/danielkun/nginx-everything-about-proxypass-2ona
# 2. https://nginx.org/en/docs/beginners_guide.html
# 3. https://www.nginx.com/resources/wiki/start/topics/examples/full/
# 4. Logging: https://docs.nginx.com/nginx/admin-guide/monitoring/logging/

worker_processes auto;
events { worker_connections 1024; }
error_log /dev/stdout debug;

http {
    
    include       mime.types;
    default_type  application/octet-stream;

    log_format custom_log '$remote_addr - [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent"';

    keepalive_timeout  65;
    sendfile on;

    # The identifier "frontend" is internal to nginx
    upstream frontend {
        # Docker Service Name (with/without Cotainer port)
        server qlts-demo-frontend-service; # Frontend
    }

    # The identifier "backend" is internal to nginx, and used to name this specific upstream
    upstream backend {
        # Docker Compose Service Name
        server qlts-demo-backend-service:8386;
    }

    # Trỏ tới Kong (cùng network qlts-network)
    upstream kong_gateway {
        server kong:8000;
    }

    client_max_body_size 20M;

    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-NginX-Proxy true;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Host $server_name;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Normal HTTP server (no ssl, completely unencrypted)
    server {
        # Listening Port of API Gateway (NGINX) in Docker Compose Containter
        listen 8888;
        
        # Front-End Service
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

                # Route sang Kong cho luồng đăng nhập/token portal (same-origin, không cần CORS)
        location ~ ^/(auth|\.well-known|taisan) {
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Back-End API Service
        location /api/ {
            # Wide Open NGINX CORS configuration
            # References: 
            # 1. https://michielkalkman.com/snippets/nginx-cors-open-configuration/
            # 2. https://tecadmin.net/how-to-enable-cors-in-nginx/

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net:30000';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net';
                #
                # Om nom nom cookies
                #
                add_header 'Access-Control-Allow-Credentials' 'true';
                # add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';

                #
                # Custom headers and headers various browsers *should* be OK with but aren't
                #
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';

                #
                # Tell client that this pre-flight info is valid for 20 days
                #
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            if ($request_method = 'GET') {
                add_header 'Access-Control-Allow-Origin' '*';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net:30000';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
            }
            if ($request_method = 'POST') {
                add_header 'Access-Control-Allow-Origin' '*';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net:30000';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
            }

            if ($request_method = 'PUT') {
                add_header 'Access-Control-Allow-Origin' '*';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net:30000';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
            }
            if ($request_method = 'PATCH') {
                add_header 'Access-Control-Allow-Origin' '*';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net:30000';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
            }
            if ($request_method = 'DELETE') {
                add_header 'Access-Control-Allow-Origin' '*';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net:30000';
                # add_header 'Access-Control-Allow-Origin' 'http://quanly.hgtp.net';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
            }

            # The following statement will proxy traffic to the upstream named "backend"
            proxy_pass         http://backend/api/;
        }
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /swagger-ui/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /v3/api-docs/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
        }


    }
}
