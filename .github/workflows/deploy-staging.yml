# Reference:
# 1. https://github.com/actions/starter-workflows/blob/main/deployments/azure-webapps-node.yml
name: Deploy for staging version

on:
  push:
    branches:
      - dev_campha # Deploy when code is pushed to 'develop'

env:
  WEBAPP_NAME: qlts # set this to your application's name
  WEBAPP_PACKAGE_PATH: "." # set this to the path to your web app project, defaults to the repository root
  NODE_VERSION: "20.x" # set this to the node version to use

# permissions:
#   contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Working Directory
        run: pwd

      - name: Create an .env file in frontend for building image
        run: |
          echo "VITE_BASE_API=${{ secrets.VITE_BASE_API}}" > ./frontend/.env
          echo "VITE_SOCKET_API=${{ secrets.VITE_SOCKET_API}}" >> ./frontend/.env

      - name: List Files
        run: ls -laR

      - name: Run Makefiles with Secrets to build anh push docker images to dockerhub
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
        run: |
          make staging
          ls -al .env
          cat .env
          cp .env deployment/staging/

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            mkdir -p /home/${{ secrets.STAGING_USER }}/qlts/deployment/campha

      - name: Transfer docker-compose file to VPS for deployment
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          source: deployment/staging/*
          target: "/home/${{ secrets.STAGING_USER }}/qlts/deployment/campha"
          strip_components: 2 # Removes "deployment/staging/" folder path!

      - name: Clean up containers and stuff via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            # Change to staging deployment directory
            cd /home/${{ secrets.STAGING_USER }}/qlts/deployment/campha 
            # Debug info
            pwd
            ls -al
            docker image prune -f
            docker compose -f staging-docker-compose.yaml down # always down first
            docker ps

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            ### Change to staging deployment directory
            cd /home/${{ secrets.STAGING_USER }}/qlts/deployment/campha 
            ### Clean up unused images
            docker image prune -f # clean up unused images
            ### Provide permissions and start the application
            chmod +x start-app.sh
            ./start-app.sh
