name: CI Check

on:
  pull_request:
    branches:
      - feature/suachua_baoduong

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build backend (Maven)
        run: mvn clean package -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Build frontend
        run: |
          echo "VITE_BASE_API=${{ secrets.VITE_BASE_API }}" > ./frontend/.env
          echo "VITE_SOCKET_API=${{ secrets.VITE_SOCKET_API }}" >> ./frontend/.env
          cd frontend && npm install && npm run build