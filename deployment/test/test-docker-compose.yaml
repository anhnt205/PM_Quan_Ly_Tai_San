services:
  qlts-demo-reverse-proxy-service:
    image: ${REGISTRY}/qlts_demo_reverse_proxy_img:${VERSION}
    ports:
      # HOST_PORT:CONTAINER_PORT
      - "5678:8888"
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - frontnet
      - backnet
    depends_on:
      - qlts-demo-frontend-service
      - qlts-demo-backend-service

  qlts-demo-frontend-service:
    image:
      ${REGISTRY}/qlts_demo_frontend_img:${VERSION}
      # target: development
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # For development only, to synced src code to container
      - /usr/src/app/node_modules
      # restart: always
    networks:
      - frontnet

  qlts-demo-backend-service:
    env_file:
      - .env_backend
    image: ${REGISTRY}/qlts_demo_backend_img:${VERSION}
    depends_on:
      - qlts-demo-mysql
    ports:
      - "8387:8386"
    networks:
      - backnet
    restart: unless-stopped

  qlts-demo-mysql:
    image: mysql:8.0.36
    command: --lower_case_table_names=1
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: QuanLyTaiSan
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3322:3306"
    volumes:
      - qlts_demo_mysql_data:/var/lib/mysql
    networks:
      - backnet

volumes:
  qlts_demo_mysql_data: # ✅ Cho postgres
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/qlts_demo_mysql_data
      o: bind
networks:
  frontnet:
  backnet:
